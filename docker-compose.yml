version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smart_books_postgres
    environment:
      POSTGRES_USER: smart_books
      POSTGRES_PASSWORD: smart_books_password
      POSTGRES_DB: smart_books_library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_books"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgvector:
    image: pgvector/pgvector:pg15
    container_name: smart_books_pgvector
    environment:
      POSTGRES_USER: smart_books
      POSTGRES_PASSWORD: smart_books_password
      POSTGRES_DB: smart_books_library
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: smart_books_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  pgvector_data:
  redis_data:
